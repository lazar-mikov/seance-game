<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAUNTED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050508;
    --green: #00ff88;
    --red: #ff2244;
    --text: #c8c8d4;
    --text-dim: #4a4a5a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', cursive;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); display: flex; align-items: center; justify-content: center; }
  .container { display: flex; flex-direction: column; align-items: center; gap: 48px; padding: 40px 24px; max-width: 400px; width: 100%; }
  .title { font-family: var(--display); font-size: 72px; letter-spacing: 16px; opacity: 0.1; }
  .subtitle { font-size: 10px; letter-spacing: 5px; color: var(--text-dim); text-transform: uppercase; text-align: center; }
  .links { display: flex; flex-direction: column; gap: 16px; width: 100%; }
  a.link-btn {
    display: block;
    width: 100%;
    padding: 20px;
    border: 1px solid #1e1e28;
    text-decoration: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-align: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  a.link-btn:hover { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.04); }
  a.link-btn.screen-link:hover { border-color: var(--red); color: var(--red); background: rgba(255,34,68,0.04); }
  .note { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-align: center; line-height: 2; }
</style>
</head>
<body>
<div class="container">
  <div class="title">HAUNTED</div>
  <div class="subtitle">Select your role</div>
  <div class="links">
    <a href="/phone.html" class="link-btn">→ Join as Participant</a>
    <a href="/screen.html" class="link-btn screen-link">→ Open Central Display</a>
  </div>
  <div class="note">
    Five participants. One display.<br>
    You never know if the next heartbeat comes.
  </div>
</div>
</body>
</html>
