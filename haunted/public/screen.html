<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAUNTED — Monitor</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#030303;font-family:'IBM Plex Mono',monospace;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:10}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.75));pointer-events:none;z-index:11}
canvas{position:fixed;inset:0;width:100%;height:100%}
#staticCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:15;opacity:0;transition:opacity .3s}
#hospital{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;z-index:12;filter:grayscale(1) contrast(1.1) brightness(0.7);pointer-events:none}
.ui{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;justify-content:space-between;padding:32px 48px;pointer-events:none}
.title{font-size:10px;letter-spacing:.35em;color:#181818;text-transform:uppercase}
.bottom{display:flex;flex-direction:column;align-items:center;gap:16px}
.msg{font-size:10px;letter-spacing:.1em;color:transparent;transition:color 2s;font-weight:300;font-style:italic;line-height:1.8;text-align:center}
.msg.on{color:#252525}
.slots{display:flex;gap:18px;align-items:center;justify-content:center}
.slot{width:10px;height:10px;border-radius:50%;background:transparent;transition:background .5s,transform .4s;transform:scale(0)}
.slot.joined{background:#1c1c1c;transform:scale(1)}
.slot.on{background:#2e2e2e;transform:scale(1)}
.slot.dead{background:rgba(255,20,20,.3);transform:scale(1)}
.question-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;text-align:center;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:20px}
.q-text{font-size:13px;letter-spacing:.12em;color:transparent;transition:color 1s;font-style:italic;font-weight:300}
.q-text.on{color:#252525}
.q-answer{font-size:11px;letter-spacing:.4em;color:transparent;transition:color .5s;text-transform:uppercase}
.q-answer.on{color:#2a2a2a}
.flicker{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:50;}
#resetBtn{position:fixed;bottom:20px;right:32px;font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.2em;color:#111;background:transparent;border:.5px solid #111;padding:5px 14px;border-radius:20px;cursor:pointer;z-index:60;transition:color .2s,border-color .2s;text-transform:uppercase}
#resetBtn:hover{color:#333;border-color:#333}
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="hospital" src="/hospital.mp4" loop muted playsinline preload="auto"></video>
<canvas id="staticCanvas"></canvas>
<div class="ui">
  <div class="title">Haunted</div>
  <div class="bottom">
    <div class="msg" id="msg"></div>
    <div class="slots" id="slots"></div>
  </div>
</div>
<div class="question-display">
  <div class="q-text" id="qtext"></div>
  <div class="q-answer" id="qanswer"></div>
</div>
<div class="flicker" id="flicker"></div>
<button id="resetBtn">Reset</button>

<script>
const socket=io();
socket.emit('register:screen');

const MSGS=['are you still here?','I know what you took.','tooth. under. pillow.','she never forgave you.','let go. let go. let go.'];
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const staticCanvas=document.getElementById('staticCanvas');
const sctx=staticCanvas.getContext('2d');
const video=document.getElementById('hospital');
let W,H,mi=0,phase='waiting';
let flatlineTime=null;
const ME={x:0,tr:[],nb:0,bpm:0,pres:0,last:0};
const slotsEl=document.getElementById('slots');
for(let i=0;i<5;i++){const d=document.createElement('div');d.className='slot';d.id='sl'+i;slotsEl.appendChild(d);}

let audioCtx=null,lastBeatTime=0;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playBeat(vol){
  if(!audioCtx||vol<0.02)return;
  const now=audioCtx.currentTime;
  const o1=audioCtx.createOscillator(),g1=audioCtx.createGain();
  o1.connect(g1);g1.connect(audioCtx.destination);
  o1.frequency.setValueAtTime(80,now);o1.frequency.exponentialRampToValueAtTime(40,now+0.08);
  g1.gain.setValueAtTime(0,now);g1.gain.linearRampToValueAtTime(vol*0.6,now+0.005);g1.gain.exponentialRampToValueAtTime(0.001,now+0.1);
  o1.start(now);o1.stop(now+0.1);
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.connect(g2);g2.connect(audioCtx.destination);
  o2.frequency.setValueAtTime(60,now+0.1);o2.frequency.exponentialRampToValueAtTime(30,now+0.18);
  g2.gain.setValueAtTime(0,now+0.1);g2.gain.linearRampToValueAtTime(vol*0.35,now+0.105);g2.gain.exponentialRampToValueAtTime(0.001,now+0.2);
  o2.start(now+0.1);o2.stop(now+0.2);
}
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('keydown',initAudio,{once:true});

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  staticCanvas.width=W;staticCanvas.height=H;
  ME.nb=0;ME.tr=[];
}
resize();
window.addEventListener('resize',resize);

function ecg(t){
  let y=0;
  if(t>0.06&&t<0.14)y+=0.10*Math.sin((t-0.06)/0.08*Math.PI);
  if(t>0.22&&t<0.27)y-=0.22*Math.sin((t-0.22)/0.05*Math.PI);
  if(t>0.27&&t<0.37)y+=1.00*Math.sin((t-0.27)/0.10*Math.PI);
  if(t>0.37&&t<0.42)y-=0.12*Math.sin((t-0.37)/0.05*Math.PI);
  if(t>0.42&&t<0.50)y+=0.60*Math.sin((t-0.42)/0.08*Math.PI);
  if(t>0.50&&t<0.56)y-=0.25*Math.sin((t-0.50)/0.06*Math.PI);
  if(t>0.60&&t<0.80)y+=0.22*Math.sin((t-0.60)/0.20*Math.PI);
  return y;
}

function presToAmp(pres,maxAmp){
  const n=pres/100*5;
  return maxAmp*(0.04+Math.pow(n/5,0.65)*0.96);
}
function presToBright(pres){
  return 0.12+Math.pow(pres/100,0.6)*0.72;
}

// Static noise renderer
function drawStatic(amount){
  if(amount<=0){sctx.clearRect(0,0,W,H);staticCanvas.style.opacity='0';return;}
  staticCanvas.style.opacity='1';
  const imageData=sctx.createImageData(W,H);
  const data=imageData.data;
  for(let i=0;i<data.length;i+=4){
    if(Math.random()<amount*0.35){
      const v=Math.floor(Math.random()*80);
      data[i]=0;data[i+1]=v;data[i+2]=0;data[i+3]=Math.floor(amount*220);
    }
  }
  sctx.putImageData(imageData,0,0);
  // Glitch lines
  if(Math.random()<amount*0.5){
    const ly=Math.random()*H;
    sctx.fillStyle=`rgba(0,${Math.floor(Math.random()*120+40)},0,${amount*0.5})`;
    sctx.fillRect(0,ly,W,Math.random()*H*0.03+1);
  }
}

let lastDraw=0;
function draw(ts){
  const dt=Math.min(ts-ME.last,50);ME.last=ts;
  const dead=phase==='flatlined';

  // Video / static handling
  if(dead&&flatlineTime!==null){
    const elapsed=(ts-flatlineTime)/1000;
    // Static heavy for first 1.5s, then video bleeds in over 4s
    const staticAmt=Math.max(0,0.95-elapsed*0.18);
    const videoAlpha=Math.min(1,Math.max(0,(elapsed-1.0)/4));
    video.style.opacity=videoAlpha;
    drawStatic(staticAmt);
    if(videoAlpha>0&&video.paused) video.play();
  }

  const spd=70*(dt/1000);
  ME.x+=spd;
  if(ME.x>W){ME.x=0;ME.tr=[];ME.nb=0;}
  const bpmT=ME.pres>2?(42+ME.pres/100*28):0;
  ME.bpm+=(bpmT-ME.bpm)*.04;
  const my=H*.5;let y=my;
  if(ME.bpm>4&&!dead){
    const bp=60000/ME.bpm,beatPx=70*(bp/1000),loc=ME.x-ME.nb;
    const amp=presToAmp(ME.pres,H*.30);
    if(loc>=0&&loc<beatPx)y=my-ecg(loc/beatPx)*amp;
    if(loc>=beatPx){
      ME.nb=ME.x;
      const now=performance.now();
      if(now-lastBeatTime>200){lastBeatTime=now;playBeat(ME.pres/100);}
    }
  }
  ME.tr.push({x:ME.x,y});
  if(ME.tr.length>W*3)ME.tr.shift();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#030303';
  ctx.fillRect(0,0,W,H);

  const bright=dead?0.06:presToBright(ME.pres);
  for(let i=1;i<ME.tr.length;i++){
    const age=(ME.tr.length-i)/ME.tr.length;
    const al=0.02+(1-age)*bright;
    ctx.beginPath();ctx.moveTo(ME.tr[i-1].x,ME.tr[i-1].y);ctx.lineTo(ME.tr[i].x,ME.tr[i].y);
    ctx.strokeStyle=dead?`rgba(120,4,4,${al})`:`rgba(155,225,155,${al})`;
    ctx.lineWidth=1.8;ctx.lineJoin='round';ctx.stroke();
  }
  ctx.fillStyle='#030303';
  ctx.fillRect(ME.x+1,0,W*.07,H);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

socket.on('question',({name,question})=>{
  const q=document.getElementById('qtext');
  const a=document.getElementById('qanswer');
  q.textContent=question;
  q.classList.add('on');
  a.textContent='...';
  a.classList.add('on');
});

socket.on('flicker',({answer,question})=>{
  const q=document.getElementById('qtext');
  const a=document.getElementById('qanswer');
  q.textContent=question;
  q.classList.add('on');
  a.textContent=answer;
  a.classList.add('on');
  doFlicker(answer==='YES'?1:2,()=>{
    setTimeout(()=>{
      q.classList.remove('on');
      a.classList.remove('on');
    },4000);
  });
});

function doFlicker(times,done){
  const el=document.getElementById('flicker');
  let count=0;
  function flash(){
    el.style.transition='none';
    el.style.opacity='0.9';
    setTimeout(()=>{
      el.style.transition='opacity 0.4s ease';
      el.style.opacity='0';
      count++;
      if(count<times) setTimeout(flash,700);
      else if(done) setTimeout(done,500);
    },150);
  }
  flash();
}

socket.on('state',state=>{
  phase=state.phase;
  ME.pres=state.holdingCount/5*100;
  state.participants.forEach((p,i)=>{
    const s=document.getElementById('sl'+i);if(!s)return;
    if(state.phase==='flatlined') s.className='slot dead';
    else if(p.holding) s.className='slot on';
    else s.className='slot joined';
  });
  for(let i=state.participants.length;i<5;i++){const s=document.getElementById('sl'+i);if(s)s.className='slot';}
  if(state.phase==='active'&&state.holdingCount>=4&&Math.random()<.01)showMsg();
});

socket.on('flatline',()=>{
  ME.pres=0;
  flatlineTime=performance.now();
  const m=document.getElementById('msg');
  m.classList.remove('on');
  setTimeout(()=>{m.textContent='the channel is closed.';m.classList.add('on');},200);
});

socket.on('reset',()=>{
  video.pause();
  video.currentTime=0;
  video.style.opacity='0';
  staticCanvas.style.opacity='0';
  flatlineTime=null;
  location.reload();
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  initAudio();socket.emit('admin:reset');
});

setInterval(showMsg,5000);
function showMsg(){
  if(ME.pres<50)return;
  mi=(mi+1)%MSGS.length;
  const m=document.getElementById('msg');
  m.classList.remove('on');
  setTimeout(()=>{m.textContent=MSGS[mi];m.classList.add('on');},200);
}
</script>
</body>
</html>
